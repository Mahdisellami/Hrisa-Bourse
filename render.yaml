services:
  # Backend API
  - type: web
    name: hrisa-bourse-api
    runtime: node
    region: frankfurt
    plan: free
    buildCommand: cd server && npm install && npm run build
    startCommand: cd server && node dist/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: DATABASE_URL
        fromDatabase:
          name: hrisa-bourse-db
          property: connectionString
      - key: OLLAMA_URL
        value: http://localhost:11434
    healthCheckPath: /api/health

databases:
  - name: hrisa-bourse-db
    databaseName: hrisa_bourse
    user: hrisa_user
    region: frankfurt
    plan: free
